name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        # bumped to v5 to pick up Node.js 24 compatibility improvements
        uses: actions/checkout@v5

      - name: Setup Node
        # bumped to v5 to pick up Node.js 24 compatibility improvements
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release checks
        run: npm run release:prepare
